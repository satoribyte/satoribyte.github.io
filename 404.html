<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="refresh" content="10;URL='../'">
    <title>404 - Satoribyte</title>
    <script src="./tab-notification.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }


        p {
            font-size: 1.5rem;
            margin: 20px 0;
            color: #f0f0f0;
        }

        .countdown {
            font-size: 1.2rem;
            color: #f0f0f0;
            margin-top: 20px;
        }

        a {
            color: #825B33;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid #825B33;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        a:hover {
            background-color: #825B33;
            color: #ffffff;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        img {
            max-width: 50%;
            height: auto;
            margin-top: 20px;
        }
    </style>
    <script src="./mediaInteraction.js"></script>
</head>

<body>
    <div class="container">
        <img src="../../../../404.avif" alt="404 Image">
        <p>Oops! The page you are looking for does not exist.</p>
        <p class="countdown">Redirecting in <span id="countdown">10</span> seconds...</p>
        <a href="../../../../../">Go Back Home</a>
    </div>

    <script>
        let countdownTime = 10;

        const countdownElement = document.getElementById('countdown');
        const countdownInterval = setInterval(() => {
            countdownTime--;
            countdownElement.textContent = countdownTime;

            if (countdownTime <= 0) {
                clearInterval(countdownInterval);
            }
        }, 1000);
    </script>
</body>

</html>
