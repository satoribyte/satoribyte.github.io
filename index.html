<!DOCTYPE html>
<html class="scroll-smooth focus:scroll-auto select-none">

<head>
  <title>SATORIBYTE - Penikmat Teknologi dan Keuangan</title>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#F7F9F8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.7/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anta&family=Varela+Round&display=swap" rel="stylesheet">
</head>

<body class="bg-slate-100" style="font-family: " Varela Round", sans-serif;">
  <div class="md:container md:mx-auto">

    <header class="h-60 border-b bg-[url('https://github.com/satoribyte/satoribyte.github.io/raw/main/l378c04F2fjeZ7vH2.webp')] bg-cover bg-center ">
      <div class="h-full flex flex-col items-center justify-center backdrop-blur-sm py-0.5">
        <h1 class="font-bold uppercase text-6xl" style='font-family: "Anta", sans-serif;'>
          SATORI<small class="font-normal">BYTE</small>
        </h1>
        <small>Penikmat Teknologi dan Keuangan</small>
      </div>
    </header>

    <main class="p-1 bg-[#F7F9F8] h-screen text-xs">
      <table class="w-full bg-white border overflow-hidden" x-data="{ tools: [] }" x-init="fetch('https://api.github.com/repos/satoribyte/satoribyte.github.io/contents/tools').then(response => response.json()).then(data => { tools = data.filter(tool => tool.name !== 'index.html') })">
        <thead class="bg-gray-200 text-gray-700">
          <tr>
            <th class="py-2 px-4">Nama</th>
            <th class="py-2 px-4">Link</th>
          </tr>
        </thead>
        <tbody class="text-gray-600">
          <template x-for="tool in tools" :key="tool.name">
            <tr>
              <td class="py-2 px-4" x-text="tool.name.split('-').map(name => name.charAt(0).toUpperCase() + name.slice(1)).join(' ').replace('.html', '')"></td>
              <td class="py-2 px-4">
                <a :href="tool.path" target="_blank" class="text-blue-500">Buka</a>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </main>

  </div>
</body>

</html>
